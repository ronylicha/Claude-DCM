version: "3.8"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-claude_context}
      POSTGRES_USER: ${DB_USER:-dcm}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dcm_secret}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - dcm-pgdata:/var/lib/postgresql/data
      - ./context-manager/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dcm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - dcm-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  dcm-api:
    build: ./context-manager
    command: bun run src/server.ts
    ports:
      - "${API_PORT:-3847}:3847"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-claude_context}
      DB_USER: ${DB_USER:-dcm}
      DB_PASSWORD: ${DB_PASSWORD:-dcm_secret}
      REDIS_URL: redis://redis:6379
      WS_AUTH_SECRET: ${WS_AUTH_SECRET:-dcm_ws_secret}
      HOST: 0.0.0.0
      PORT: 3847
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dcm-ws:
    build: ./context-manager
    command: bun run src/websocket-server.ts
    ports:
      - "${WS_PORT:-3849}:3849"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-claude_context}
      DB_USER: ${DB_USER:-dcm}
      DB_PASSWORD: ${DB_PASSWORD:-dcm_secret}
      REDIS_URL: redis://redis:6379
      WS_AUTH_SECRET: ${WS_AUTH_SECRET:-dcm_ws_secret}
      HOST: 0.0.0.0
      WS_PORT: 3849
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dcm-dashboard:
    build:
      context: ./context-dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://${DCM_HOST:-127.0.0.1}:${API_PORT:-3847}
        NEXT_PUBLIC_WS_URL: ws://${DCM_HOST:-127.0.0.1}:${WS_PORT:-3849}
    ports:
      - "${DASHBOARD_PORT:-3848}:3848"
    environment:
      NODE_ENV: production
      PORT: 3848
    depends_on:
      - dcm-api
      - dcm-ws
    restart: unless-stopped

volumes:
  dcm-pgdata:
  dcm-redis:
